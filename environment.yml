name: cameroon-admin
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.10

  # Core scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3

  # Geospatial stack
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9
  - rtree>=1.0
  - gdal>=3.6

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12
  - plotly>=5.18
  - folium>=0.14

  # Streamlit dashboard
  - streamlit>=1.28
  - pip

  # Excel support
  - openpyxl>=3.1
  - xlsxwriter>=3.1

  # Install pip-only packages
  - pip:
      - streamlit-folium>=0.15
